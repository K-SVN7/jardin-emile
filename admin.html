<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Le Jardin d'Émile</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blanc: #FAF7F2;
  --blanc-pur: #FFFFFF;
  --vert: #2C3E2D;
  --vert-pale: #EEF1EE;
  --terra: #C17A5A;
  --texte: #1A1A1A;
  --texte-doux: #555550;
  --erreur: #C0392B;
  --f-titre: 'Cormorant Garamond', serif;
  --f-corps: 'Inter', sans-serif;
}

body {
  background: var(--blanc);
  color: var(--texte);
  font-family: var(--f-corps);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

a { text-decoration: none; color: inherit; }

.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--vert);
}

.login-box {
  background: var(--blanc);
  width: 100%;
  max-width: 400px;
  padding: 48px 40px;
}

.login-logo {
  font-family: var(--f-titre);
  font-size: 26px;
  font-weight: 300;
  color: var(--vert);
  margin-bottom: 6px;
}

.login-subtitle {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 36px;
}

.login-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--texte-doux);
  margin-bottom: 8px;
  display: block;
}

.login-input {
  width: 100%;
  background: var(--blanc-pur);
  border: 1px solid rgba(44,62,45,0.18);
  padding: 12px 14px;
  font-family: var(--f-corps);
  font-size: 14px;
  font-weight: 300;
  color: var(--texte);
  outline: none;
  transition: border-color 0.3s;
  margin-bottom: 16px;
  border-radius: 0;
}

.login-input:focus { border-color: var(--vert); }

.login-btn {
  width: 100%;
  background: var(--vert);
  color: var(--blanc);
  border: none;
  padding: 14px;
  font-family: var(--f-corps);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}

.login-btn:hover { background: var(--terra); }

.login-erreur {
  background: #fdf0ee;
  border-left: 2px solid var(--erreur);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--erreur);
  margin-bottom: 16px;
  display: none;
}

.login-erreur.visible { display: block; }

.spinner-sm {
  width: 14px;
  height: 14px;
  border: 1px solid rgba(250,247,242,0.4);
  border-top-color: var(--blanc);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}

.login-btn.loading .spinner-sm { display: block; }
.login-btn.loading .btn-label { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

.admin-page { display: none; min-height: 100vh; }
.admin-page.visible { display: block; }

.admin-header {
  background: var(--vert);
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.admin-header-logo {
  font-family: var(--f-titre);
  font-size: 20px;
  font-weight: 300;
  color: var(--blanc);
}

.admin-header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.admin-user {
  font-size: 12px;
  font-weight: 300;
  color: rgba(250,247,242,0.55);
}

.btn-deconnexion {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(250,247,242,0.6);
  background: none;
  border: 1px solid rgba(250,247,242,0.2);
  padding: 7px 14px;
  cursor: pointer;
  font-family: var(--f-corps);
  transition: color 0.3s, border-color 0.3s;
}

.btn-deconnexion:hover { color: var(--terra); border-color: var(--terra); }

.admin-body {
  max-width: 900px;
  margin: 0 auto;
  padding: 56px 40px;
}

.admin-section-titre {
  font-family: var(--f-titre);
  font-size: 36px;
  font-weight: 300;
  color: var(--vert);
  margin-bottom: 6px;
}

.admin-section-sous {
  font-size: 13px;
  font-weight: 300;
  color: var(--texte-doux);
  margin-bottom: 40px;
}

.trait {
  width: 36px;
  height: 1px;
  background: var(--terra);
  margin: 16px 0 36px;
}

.form-nouvelle-actu {
  background: var(--blanc-pur);
  border: 1px solid rgba(44,62,45,0.1);
  padding: 36px 32px;
  margin-bottom: 48px;
}

.form-nouvelle-actu-titre {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 24px;
}

.form-group { margin-bottom: 20px; }

.form-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--texte-doux);
  margin-bottom: 8px;
  display: block;
}

.form-input,
.form-textarea {
  width: 100%;
  background: var(--blanc);
  border: 1px solid rgba(44,62,45,0.15);
  padding: 12px 14px;
  font-family: var(--f-corps);
  font-size: 14px;
  font-weight: 300;
  color: var(--texte);
  outline: none;
  transition: border-color 0.3s;
  border-radius: 0;
}

.form-input:focus,
.form-textarea:focus { border-color: var(--vert); }

.form-textarea {
  resize: vertical;
  min-height: 100px;
  line-height: 1.6;
}

.form-input::placeholder,
.form-textarea::placeholder { color: rgba(85,85,80,0.35); }

.btn-publier {
  background: var(--vert);
  color: var(--blanc);
  border: none;
  padding: 13px 28px;
  font-family: var(--f-corps);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-publier:hover:not(:disabled) { background: var(--terra); }
.btn-publier:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-publier.loading .spinner-sm { display: block; }
.btn-publier.loading .btn-label { display: none; }

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--vert);
  color: var(--blanc);
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.04em;
  transform: translateY(80px);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
  z-index: 50;
  max-width: 320px;
}

.toast.visible { transform: translateY(0); opacity: 1; }
.toast.erreur { background: var(--erreur); }

.actus-liste-titre {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--texte-doux);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(44,62,45,0.1);
}

.actu-item {
  background: var(--blanc-pur);
  border: 1px solid rgba(44,62,45,0.1);
  padding: 24px 24px 20px;
  margin-bottom: 2px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: start;
  transition: background 0.2s;
}

.actu-item:hover { background: var(--vert-pale); }

.actu-item-date {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--terra);
  margin-bottom: 6px;
}

.actu-item-titre {
  font-family: var(--f-titre);
  font-size: 20px;
  font-weight: 400;
  color: var(--vert);
  margin-bottom: 6px;
  line-height: 1.2;
}

.actu-item-texte {
  font-size: 13px;
  font-weight: 300;
  color: var(--texte-doux);
  line-height: 1.6;
}

.btn-supprimer {
  background: none;
  border: 1px solid rgba(192,57,43,0.25);
  color: var(--erreur);
  padding: 7px 14px;
  font-family: var(--f-corps);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.btn-supprimer:hover {
  background: var(--erreur);
  color: var(--blanc);
  border-color: var(--erreur);
}

.actus-vide {
  padding: 40px 24px;
  text-align: center;
  color: var(--texte-doux);
  font-size: 14px;
  font-style: italic;
  font-family: var(--f-titre);
  background: var(--blanc-pur);
  border: 1px solid rgba(44,62,45,0.08);
}

.actus-loading {
  padding: 32px 24px;
  text-align: center;
  color: var(--texte-doux);
  font-size: 13px;
  letter-spacing: 0.06em;
}

.lien-site {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250,247,242,0.5);
  transition: color 0.3s;
}

.lien-site:hover { color: var(--terra); }

@media (max-width: 600px) {
  .admin-header { padding: 0 20px; }
  .admin-body { padding: 36px 20px; }
  .form-nouvelle-actu { padding: 24px 20px; }
  .actu-item { grid-template-columns: 1fr; }
  .admin-header-right { gap: 12px; }
  .admin-user { display: none; }
}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-box">
    <p class="login-logo">Le Jardin d'Émile</p>
    <p class="login-subtitle">Espace administration</p>
    <div class="login-erreur" id="loginErreur">Email ou mot de passe incorrect.</div>
    <label class="login-label" for="loginEmail">Email</label>
    <input class="login-input" type="email" id="loginEmail" placeholder="votre@email.fr" autocomplete="email">
    <label class="login-label" for="loginMdp">Mot de passe</label>
    <input class="login-input" type="password" id="loginMdp" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">
      <span class="btn-label">Se connecter</span>
      <span class="spinner-sm"></span>
    </button>
  </div>
</div>

<div class="admin-page" id="adminPage">
  <div class="admin-header">
    <p class="admin-header-logo">Le Jardin d'Émile</p>
    <div class="admin-header-right">
      <p class="admin-user" id="adminUserEmail"></p>
      <a href="index.html" class="lien-site" target="_blank">Voir le site →</a>
      <button class="btn-deconnexion" id="btnDeconnexion">Déconnexion</button>
    </div>
  </div>

  <div class="admin-body">
    <h1 class="admin-section-titre">Actualités</h1>
    <p class="admin-section-sous">Publiez et gérez les actualités affichées sur le site.</p>
    <div class="trait"></div>

    <div class="form-nouvelle-actu">
      <p class="form-nouvelle-actu-titre">Nouvelle actualité</p>
      <div class="form-group">
        <label class="form-label" for="actuTitre">Titre <span style="color:var(--terra)">*</span></label>
        <input class="form-input" type="text" id="actuTitre" placeholder="Ex : Fermeture exceptionnelle le 25 décembre">
      </div>
      <div class="form-group">
        <label class="form-label" for="actuTexte">Texte <span style="color:var(--terra)">*</span></label>
        <textarea class="form-textarea" id="actuTexte" placeholder="Le détail de votre actualité…"></textarea>
      </div>
      <button class="btn-publier" id="btnPublier">
        <span class="btn-label">Publier l'actualité</span>
        <span class="spinner-sm"></span>
      </button>
    </div>

    <p class="actus-liste-titre">Actualités publiées</p>
    <div id="actusListe">
      <div class="actus-loading">Chargement…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIRzwxRIZbvUV7EWHwGEdHDPKdrW6UFhA",
  authDomain: "jardin-emile.firebaseapp.com",
  projectId: "jardin-emile",
  storageBucket: "jardin-emile.firebasestorage.app",
  messagingSenderId: "541652042818",
  appId: "1:541652042818:web:e01e494f6c3ee323c799db"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginPage = document.getElementById('loginPage');
const adminPage = document.getElementById('adminPage');
const loginErreur = document.getElementById('loginErreur');
const loginBtn = document.getElementById('loginBtn');
const adminUserEmail = document.getElementById('adminUserEmail');
const actusListe = document.getElementById('actusListe');
const btnPublier = document.getElementById('btnPublier');

function showToast(msg, erreur = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (erreur ? ' erreur' : '');
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3500);
}

onAuthStateChanged(auth, user => {
  if (user) {
    loginPage.style.display = 'none';
    adminPage.classList.add('visible');
    adminUserEmail.textContent = user.email;
    chargerActus();
  } else {
    loginPage.style.display = 'flex';
    adminPage.classList.remove('visible');
  }
});

document.getElementById('loginMdp').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginBtn.click();
});

loginBtn.addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const mdp = document.getElementById('loginMdp').value;
  if (!email || !mdp) return;

  loginBtn.classList.add('loading');
  loginBtn.disabled = true;
  loginErreur.classList.remove('visible');

  try {
    await signInWithEmailAndPassword(auth, email, mdp);
  } catch (err) {
    loginErreur.classList.add('visible');
    loginBtn.classList.remove('loading');
    loginBtn.disabled = false;
  }
});

document.getElementById('btnDeconnexion').addEventListener('click', async () => {
  await signOut(auth);
});

async function chargerActus() {
  actusListe.innerHTML = '<div class="actus-loading">Chargement…</div>';
  try {
    const q = query(collection(db, 'actualites'), orderBy('date', 'desc'));
    const snap = await getDocs(q);
    if (snap.empty) {
      actusListe.innerHTML = '<div class="actus-vide">Aucune actualité publiée pour le moment.</div>';
      return;
    }
    actusListe.innerHTML = '';
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const dateStr = d.date?.toDate
        ? d.date.toDate().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      const item = document.createElement('div');
      item.className = 'actu-item';
      item.innerHTML = `
        <div>
          <p class="actu-item-date">${dateStr}</p>
          <p class="actu-item-titre">${d.titre || ''}</p>
          <p class="actu-item-texte">${d.texte || ''}</p>
        </div>
        <button class="btn-supprimer" data-id="${docSnap.id}">Supprimer</button>`;
      actusListe.appendChild(item);
    });

    actusListe.querySelectorAll('.btn-supprimer').forEach(btn => {
      btn.addEventListener('click', () => supprimerActu(btn.dataset.id));
    });
  } catch (err) {
    actusListe.innerHTML = '<div class="actus-vide">Erreur de chargement. Vérifiez votre connexion.</div>';
  }
}

btnPublier.addEventListener('click', async () => {
  const titre = document.getElementById('actuTitre').value.trim();
  const texte = document.getElementById('actuTexte').value.trim();

  if (!titre || !texte) {
    showToast('Merci de remplir le titre et le texte.', true);
    return;
  }

  btnPublier.classList.add('loading');
  btnPublier.disabled = true;

  try {
    await addDoc(collection(db, 'actualites'), {
      titre,
      texte,
      date: serverTimestamp()
    });
    document.getElementById('actuTitre').value = '';
    document.getElementById('actuTexte').value = '';
    showToast('Actualité publiée avec succès.');
    chargerActus();
  } catch (err) {
    showToast('Erreur lors de la publication. Réessayez.', true);
  } finally {
    btnPublier.classList.remove('loading');
    btnPublier.disabled = false;
  }
});

async function supprimerActu(id) {
  if (!confirm('Supprimer cette actualité ?')) return;
  try {
    await deleteDoc(doc(db, 'actualites', id));
    showToast('Actualité supprimée.');
    chargerActus();
  } catch (err) {
    showToast('Erreur lors de la suppression.', true);
  }
}
</script>

</body>
</html>
